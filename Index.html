<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eavan's P6 Revision Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--green:#58CC02;--green-dark:#46a302;--green-light:#d7ffb8;
--blue:#1CB0F6;--blue-dark:#0995d3;--blue-light:#ddf4ff;
--red:#FF4B4B;--red-light:#ffdfe0;
--orange:#FF9600;--orange-light:#fff4e0;
--purple:#CE82FF;--purple-light:#f3e5ff;
--yellow:#FFC800;--yellow-light:#fff9e0;
--pink:#FF86D0;--pink-light:#ffe5f4;
--gray:#E5E5E5;--gray-dark:#AFAFAF;--gray-text:#4B4B4B;
--white:#FFFFFF;--bg:#F7F7F7;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--gray-text);min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:2px solid var(--gray);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:8px}
.mascot{font-size:32px}
.app-title{font-size:18px;font-weight:800;color:var(--green)}
.topbar-stats{display:flex;gap:14px;align-items:center}
.stat{display:flex;align-items:center;gap:4px;font-weight:700;font-size:14px}
.stat-icon{font-size:18px}

/* TABS */
.tab-bar{display:flex;background:var(--white);border-bottom:2px solid var(--gray);position:sticky;top:54px;z-index:99}
.tab-btn{flex:1;padding:12px;text-align:center;font-weight:800;font-size:14px;border:none;background:none;cursor:pointer;color:var(--gray-dark);border-bottom:3px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover{background:var(--blue-light)}

/* CONTENT */
.content{max-width:680px;margin:0 auto;padding:16px 16px 100px}

/* SECTION PILLS */
.pills{display:flex;gap:8px;padding:8px 0 16px;justify-content:center;flex-wrap:wrap}
.pill{padding:8px 18px;border-radius:20px;font-weight:700;font-size:13px;border:2px solid var(--gray);background:var(--white);cursor:pointer;transition:all .2s}
.pill.active{background:var(--green);color:#fff;border-color:var(--green-dark)}
.pill:hover:not(.active){border-color:var(--green)}

/* CARDS */
.card{background:var(--white);border-radius:16px;padding:20px;border:2px solid var(--gray);margin-bottom:14px;transition:all .2s}
.card:hover{border-color:var(--blue)}
.card-clickable{cursor:pointer}
.card-clickable:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}

/* BANNER */
.banner{border-radius:16px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;color:#fff;cursor:pointer;transition:transform .2s}
.banner:hover{transform:scale(1.02)}
.banner .icon{font-size:40px}
.banner h3{font-weight:800;font-size:16px}
.banner p{opacity:.9;font-size:13px}

/* CONCEPT CARD (expandable) */
.concept-hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:700;font-size:15px}
.concept-hdr .arrow{transition:transform .3s;font-size:16px}
.concept-hdr .arrow.open{transform:rotate(180deg)}
.concept-body{padding:0 20px 16px;display:none;font-size:14px;line-height:1.7}
.concept-body.show{display:block}
.callout{padding:10px 14px;margin:8px 0;border-radius:0 8px 8px 0;font-size:13px;line-height:1.6}
.callout-yellow{background:var(--yellow-light);border-left:4px solid var(--yellow)}
.callout-green{background:var(--green-light);border-left:4px solid var(--green)}
.callout-red{background:var(--red-light);border-left:4px solid var(--red)}
.callout-blue{background:var(--blue-light);border-left:4px solid var(--blue)}
.concept-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.concept-body th,.concept-body td{padding:6px 10px;border:2px solid var(--gray);text-align:left}
.concept-body th{background:var(--blue-light);font-weight:700}

/* PROGRESS */
.prog-label{font-size:12px;font-weight:700;color:var(--gray-dark);margin-bottom:4px}
.prog-bar{height:12px;background:var(--gray);border-radius:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width .5s ease}

/* QUESTION */
.q-card{background:var(--white);border-radius:16px;padding:22px;border:2px solid var(--gray);margin-bottom:14px}
.q-num{font-size:12px;font-weight:800;color:var(--blue);text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:15px;font-weight:700;margin-bottom:14px;line-height:1.5}
.q-context{background:var(--bg);padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 16px;border-radius:12px;border:2px solid var(--gray);background:var(--white);font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px}
.opt:hover:not(.sel):not(.ok):not(.no){border-color:var(--blue);background:var(--blue-light)}
.opt.sel{border-color:var(--blue);background:var(--blue-light)}
.opt.ok{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.opt.no{border-color:var(--red);background:var(--red-light);color:var(--red)}
.opt-l{width:26px;height:26px;border-radius:7px;border:2px solid var(--gray);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
.opt.ok .opt-l{border-color:var(--green);background:var(--green);color:#fff}
.opt.no .opt-l{border-color:var(--red);background:var(--red);color:#fff}

/* MISTAKE MUSEUM */
.museum-card{background:var(--white);border-radius:16px;overflow:hidden;border:2px solid var(--gray);margin-bottom:14px}
.museum-hdr{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer}
.museum-hdr .m-icon{font-size:28px}
.museum-hdr .m-title{font-weight:800;font-size:15px}
.museum-hdr .m-sub{font-size:12px;color:var(--gray-dark)}
.museum-hdr .m-badge{margin-left:auto;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:800}
.m-badge-new{background:var(--orange-light);color:var(--orange)}
.m-badge-done{background:var(--green-light);color:var(--green-dark)}

/* STEP INDICATOR */
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--gray)}
.step-dot.active{background:var(--blue);transform:scale(1.3)}
.step-dot.done{background:var(--green)}
.step-label{text-align:center;font-size:12px;font-weight:700;color:var(--blue);margin-bottom:12px}

/* WRONG WORKING DISPLAY */
.wrong-work{background:#FFF5F5;border:2px solid var(--red);border-radius:12px;padding:16px;margin:12px 0;font-size:14px;line-height:1.8;position:relative}
.wrong-work::before{content:"Eavan's Working";position:absolute;top:-10px;left:12px;background:var(--red);color:#fff;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:800}
.wrong-work .crossed{text-decoration:line-through;color:var(--red);opacity:.7}
.wrong-work .error-highlight{background:var(--red-light);border:2px dashed var(--red);border-radius:4px;padding:1px 4px;font-weight:800}

.correct-work{background:#F0FFF0;border:2px solid var(--green);border-radius:12px;padding:16px;margin:12px 0;font-size:14px;line-height:1.8;position:relative}
.correct-work::before{content:"Correct Method";position:absolute;top:-10px;left:12px;background:var(--green);color:#fff;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:800}

/* REFUTATION BOX */
.refute-box{border-radius:14px;padding:18px;margin:12px 0}
.refute-wrong{background:linear-gradient(135deg,#FFF0F0,#FFE0E0);border:2px solid var(--red)}
.refute-wrong h4{color:var(--red);font-size:14px;margin-bottom:8px}
.refute-right{background:linear-gradient(135deg,#F0FFF0,#E0FFE0);border:2px solid var(--green)}
.refute-right h4{color:var(--green-dark);font-size:14px;margin-bottom:8px}
.refute-wrong p,.refute-right p{font-size:13px;line-height:1.6}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:14px;border:none;font-size:15px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .1s}
.btn:active{transform:translateY(2px)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-dark)}
.btn-green:hover{background:var(--green-dark)}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--blue-dark)}
.btn-blue:hover{background:var(--blue-dark)}
.btn-orange{background:var(--orange);color:#fff;box-shadow:0 4px 0 #cc7800}
.btn-purple{background:var(--purple);color:#fff;box-shadow:0 4px 0 #a55ecc}
.btn:disabled{background:var(--gray);box-shadow:0 4px 0 var(--gray-dark);cursor:not-allowed}
.btn-sm{width:auto;padding:8px 20px;font-size:13px}

/* FEEDBACK */
.fb{margin-top:10px;padding:12px 16px;border-radius:12px;font-weight:700;font-size:14px;display:none;align-items:flex-start;gap:10px}
.fb.show{display:flex}
.fb-ok{background:var(--green-light);color:var(--green-dark)}
.fb-no{background:var(--red-light);color:var(--red)}
.fb-icon{font-size:20px;flex-shrink:0}
.fb-text{line-height:1.5}
.fb-explain{font-weight:600;font-size:13px;margin-top:4px;opacity:.85}

/* CELEBRATION */
.celeb{position:fixed;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;z-index:1000;background:rgba(0,0,0,.4)}
.celeb.show{display:flex}
.celeb-card{background:#fff;border-radius:24px;padding:36px;text-align:center;max-width:340px;animation:popIn .4s ease}
.celeb-card .trophy{font-size:72px;margin-bottom:12px}
.celeb-card h2{font-size:26px;font-weight:900;color:var(--orange);margin-bottom:6px}
.celeb-card .xp-earn{font-size:22px;font-weight:900;color:var(--yellow);margin:10px 0}

/* HOME GRID */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:16px}
.day-card{background:var(--white);border:2px solid var(--gray);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.day-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.day-card.done{border-color:var(--green);background:var(--green-light)}
.day-card.cur{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-light)}
.day-card.locked{opacity:.5;cursor:default}
.day-card .de{font-size:28px;margin-bottom:4px}
.day-card .dl{font-weight:800;font-size:13px}
.day-card .dt{font-size:11px;color:var(--gray-dark);margin-top:2px}

/* WELCOME */
.welcome{text-align:center;padding:30px 10px}
.welcome .big-owl{font-size:80px;display:block;margin-bottom:12px}
.welcome h1{font-size:28px;font-weight:900;color:var(--green)}
.welcome .sub{font-size:15px;color:var(--gray-dark);margin:6px 0 20px}

/* STREAK REMINDER */
.streak-msg{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;font-weight:700;font-size:14px}

/* ANIMATIONS */
.confetti{position:fixed;width:10px;height:10px;z-index:2000;animation:cfall linear forwards;pointer-events:none}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.bounce{animation:bounce .5s ease}
.shake{animation:shake .3s ease}
.pulse{animation:pulse 2s infinite}

@media(max-width:500px){.topbar-stats{gap:8px}.stat{font-size:12px}.content{padding:10px 10px 100px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left"><span class="mascot">🦉</span><span class="app-title">Eavan's Revision Hub</span></div>
  <div class="topbar-stats">
    <div class="stat"><span class="stat-icon">🔥</span><span id="sStreak">0</span></div>
    <div class="stat"><span class="stat-icon">⚡</span><span id="sXP">0</span></div>
    <div class="stat"><span class="stat-icon">❤️</span><span id="sHearts">5</span></div>
  </div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="go('home')">🏠 Home</button>
  <button class="tab-btn" onclick="go('maths')">🔢 Maths</button>
  <button class="tab-btn" onclick="go('science')">🔬 Science</button>
</div>
<div class="content" id="app"></div>
<div class="celeb" id="celeb">
  <div class="celeb-card">
    <div class="trophy" id="cT">🏆</div>
    <h2 id="cH">Amazing!</h2>
    <p id="cM">Session complete!</p>
    <div class="xp-earn" id="cX">+50 XP</div>
    <button class="btn btn-green" style="margin-top:14px" onclick="closeCeleb()">CONTINUE</button>
  </div>
</div>

<script>
// ============ AUDIO ============
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function ea(){if(!ac)ac=new AC()}
function sndOk(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';const t=ac.currentTime;o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.1);o.frequency.setValueAtTime(784,t+.2);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.01,t+.4);o.start();o.stop(t+.4)}
function sndNo(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sawtooth';const t=ac.currentTime;o.frequency.setValueAtTime(200,t);o.frequency.setValueAtTime(150,t+.15);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start();o.stop(t+.3)}
function sndUp(){ea();[523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;const t=ac.currentTime+i*.12;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start(t);o.stop(t+.3)})}
function sndClick(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+.05);o.start();o.stop(ac.currentTime+.05)}
function sndReveal(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='triangle';const t=ac.currentTime;o.frequency.setValueAtTime(400,t);o.frequency.setValueAtTime(600,t+.15);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start();o.stop(t+.3)}

// ============ STATE (in-memory, no localStorage) ============
let S={xp:0,streak:0,hearts:5,lastDate:null,done:[],museumDone:[],qAns:0,qOk:0};
function save(){document.getElementById('sXP').textContent=S.xp;document.getElementById('sStreak').textContent=S.streak;document.getElementById('sHearts').textContent=S.hearts}
const today=new Date().toDateString();
save();
function addXP(n){S.xp+=n;S.lastDate=today;save();const e=document.getElementById('sXP');e.classList.add('bounce');setTimeout(()=>e.classList.remove('bounce'),500)}
function loseH(){if(S.hearts>0)S.hearts--;if(S.hearts<=0)S.hearts=5;save();const e=document.getElementById('sHearts');e.classList.add('shake');setTimeout(()=>e.classList.remove('shake'),300)}

// ============ CONFETTI ============
function confetti(){const cols=['#58CC02','#1CB0F6','#FF4B4B','#FF9600','#CE82FF','#FFC800','#FF86D0'];for(let i=0;i<50;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=cols[~~(Math.random()*cols.length)];c.style.borderRadius=Math.random()>.5?'50%':'2px';c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';c.style.animationDuration=(1.5+Math.random()*2)+'s';c.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}}

// ============ ENCOURAGEMENT ============
const enc=["🌟 Fantastic!","🎯 Spot on!","💪 Crushing it!","🧠 Big brain!","⭐ Superstar!","🚀 On fire!","🎉 Nailed it!","✨ Brilliant!","🏅 Champion!","💫 Way to go!"];
const encNo=["🤔 Almost! Let's learn from this.","💡 Good try! Here's the key...","📚 This is how we grow!","🌱 Mistakes help us learn!","🔄 You'll remember next time!","💪 Keep going!"];

// ============ MISTAKE MUSEUM DATA ============
const museum = [
  {id:'m1',title:'The Ratio Reversal',emoji:'🔄',subject:'maths',
   desc:'Mixing up the ORDER of a ratio',
   scenario:'There are 35 adults and 20 children at a park. What is the ratio of the number of children to the total number of people?',
   wrongWork:'Eavan wrote: Adults:Children = 35:20\nTotal = 35 + 20 = 55\nAnswer: <span class="error-highlight">55 : 20 = 11 : 4</span>',
   spotQ:{q:'What mistake did Eavan make?',opts:['She wrote total:children instead of children:total','She added wrong','She forgot to simplify','She used the wrong numbers'],correct:0},
   whyWrong:'<b>The ratio order was reversed.</b> The question asks for <em>children to total</em>, which is 20:55. But Eavan wrote <em>total to children</em> (55:20). In ratios, the ORDER matters — A:B is completely different from B:A!',
   whyRight:'Always underline the words that tell you the order. "Ratio of <u>children</u> to <u>total</u>" means children comes FIRST.\n\nChildren : Total = 20 : 55 = <b>4 : 11</b>',
   practiceQ:{q:'The ratio of boys to girls is 3:5. What is the ratio of girls to the total number of students?',opts:['5:8','3:8','5:3','8:5'],correct:0,explain:'Girls:Total = 5:(3+5) = 5:8. Girls come first because the question says "girls to total".'}
  },
  {id:'m2',title:'The Cross-Multiply Trap',emoji:'❌',subject:'maths',
   desc:'Getting the wrong ratio from fraction equations',
   scenario:'1/3 of Steven\'s mass is equal to 3/5 of Henry\'s mass.\n(a) What is the ratio of Steven\'s mass to Henry\'s mass?',
   wrongWork:'Eavan wrote: 1/3 × 3 = 3/5 × 5\nS : H = <span class="error-highlight">5 : 3</span> (just used the denominators)',
   spotQ:{q:'What did Eavan do wrong?',opts:['She just used the denominators instead of cross-multiplying properly','She multiplied by the wrong number','She forgot to simplify','She swapped S and H'],correct:0},
   whyWrong:'<b>You can\'t just read off the denominators!</b> S/3 = 3H/5 does NOT mean S:H = 5:3. The "3" in the numerator of 3/5 matters! You need to cross-multiply: 5×S = 3×3×H → 5S = 9H.',
   whyRight:'S/3 = 3H/5\nCross-multiply: 5 × S = 3 × 3 × H\n5S = 9H\nSo S:H = <b>9:5</b>\n\n💡 Tip: When you have fractions equal to each other, always cross-multiply to find the ratio.',
   practiceQ:{q:'1/4 of A = 2/3 of B. What is A:B?',opts:['8:3','3:8','4:3','2:4'],correct:0,explain:'A/4 = 2B/3. Cross-multiply: 3A = 8B. So A:B = 8:3.'}
  },
  {id:'m3',title:'The Wrong Flip',emoji:'🔃',subject:'maths',
   desc:'Flipping the wrong fraction when dividing',
   scenario:'Divide 7/8 by 1/4. Give your answer in its simplest form.',
   wrongWork:'Eavan wrote: 7/8 ÷ 1/4\n= 7/8 × <span class="error-highlight">7/1</span>\n= 49/8\n(She flipped 7/8 instead of 1/4!)',
   spotQ:{q:'Which fraction did Eavan flip by mistake?',opts:['She flipped the first fraction (7/8) instead of the second (1/4)','She flipped both fractions','She forgot to flip anything','She multiplied top and bottom separately'],correct:0},
   whyWrong:'<b>Only flip the fraction AFTER the ÷ sign!</b> KCF rule: Keep the first fraction → Change ÷ to × → Flip the SECOND fraction only. Eavan flipped 7/8 to get 8/7, then confused herself.',
   whyRight:'7/8 ÷ 1/4\n<b>K</b>eep: 7/8\n<b>C</b>hange: ÷ → ×\n<b>F</b>lip the second: 1/4 → 4/1\n= 7/8 × 4/1 = 28/8 = <b>3 1/2</b>',
   practiceQ:{q:'What is 9 ÷ 6/7?',opts:['10 1/2','63/7','7 5/6','54/6'],correct:0,explain:'9 ÷ 6/7 = 9 × 7/6 = 63/6 = 10 3/6 = 10 1/2. Flip the 6/7 to 7/6, then multiply.'}
  },
  {id:'m4',title:'The Decimal Mix-Up',emoji:'💰',subject:'maths',
   desc:'Confusing the percentage with the amount in calculations',
   scenario:'Michelle had $420. She spent 60% of her money on books. How much money had she left?',
   wrongWork:'Eavan wrote: Left = 40%\n<span class="error-highlight">0.42 × 40 = $16.80</span>',
   spotQ:{q:'What TWO things did Eavan mix up?',opts:['She used 0.42 instead of 0.40, AND multiplied by 40 instead of 420','She forgot to subtract','She used 60% instead of 40%','She divided instead of multiplied'],correct:0},
   whyWrong:'<b>Two errors in one!</b>\n1. She wrote 0.42 (which is 42%) instead of 0.40 (which is 40%)\n2. She multiplied by 40 (the percentage number) instead of $420 (the money amount)\n\nThe percentage and the dollar amount got swapped in her mind!',
   whyRight:'Left = 100% - 60% = 40% of $420\n= 0.40 × $420\n= <b>$168</b>\n\n💡 Tip: Always write it as a sentence first: "40% OF $420" means 0.40 × 420. The "OF" means ×, and the number after "of" is always the TOTAL amount.',

  {d:6,emoji:'🔄',title:'Mixed Challenge',desc:'All topics shuffled — ready for anything!',
   museum:[], mathsQ:{t:'mixed',ids:[0,3,5,8,2]}, sciQ:{t:'mixed',ids:[0,2,4,1,3]}},
  {d:7,emoji:'🏆',title:'Boss Battle!',desc:'Final challenge — prove you\'ve mastered it all!',
   museum:[], mathsQ:{t:'challenge',ids:[7,9,5,10,4]}, sciQ:{t:'challenge',ids:[3,5,8,1,9]}},
];

// ============ NAV STATE ============
let tab='home', section='museum', sel=null, answered=false, qIdx=0, qScore=0, quiz=null;
let museumStep=0, museumEntry=null;

function go(t){sndClick();tab=t;section=t==='home'?'home':'museum';quiz=null;museumEntry=null;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(t==='home'&&i===0)||(t==='maths'&&i===1)||(t==='science'&&i===2)));
  render()}

// ============ RENDER ============
function render(){
  const el=document.getElementById('app');
  if(tab==='home') el.innerHTML=renderHome();
  else el.innerHTML=renderSubject(tab);
}

function renderHome(){
  const streakMsg = S.streak>=3 ? '<div class="streak-msg">🔥 '+S.streak+'-day streak! Keep the fire alive!</div>' :
    S.streak>0 ? '<div class="streak-msg" style="background:linear-gradient(135deg,var(--blue),var(--purple))">🌟 '+S.streak+'-day streak started! Come back tomorrow!</div>' : '';
  let h='<div class="welcome"><span class="big-owl">🦉</span><h1>Welcome, Eavan!</h1>'+
    '<p class="sub">Your 7-day revision journey — 15 min a day, Maths + Science!</p></div>'+
    streakMsg+
    '<div style="margin-bottom:16px"><div class="prog-label">Journey Progress: '+S.done.length+'/7 days complete</div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+((S.done.length/7)*100)+'%;background:linear-gradient(90deg,var(--green),var(--blue))"></div></div></div>'+
    '<div class="day-grid">';
  days.forEach(function(d){
    var done=S.done.includes(d.d), cur=d.d===(Math.max.apply(null,S.done.concat([0]))+1)&&!done;
    var locked=d.d>(Math.max.apply(null,S.done.concat([0]))+1)&&!done;
    h+='<div class="day-card '+(done?'done':'')+' '+(cur?'cur':'')+' '+(locked?'locked':'')+'" onclick="'+(locked?'':'startDay('+d.d+')')+'">'+
      '<div class="de">'+(done?'✅':locked?'🔒':d.emoji)+'</div>'+
      '<div class="dl">Day '+d.d+'</div>'+
      '<div class="dt">'+d.title+'</div></div>';
  });
  h+='</div>';
  if(S.qAns>0) h+='<div class="card" style="margin-top:16px;text-align:center"><b>📊 Your Stats</b><br>Questions answered: '+S.qAns+' | Correct: '+S.qOk+' ('+Math.round(S.qOk/S.qAns*100)+'%)</div>';
  return h;
}

function renderSubject(subj){
  if(museumEntry) return renderMuseumFlow();
  if(quiz) return renderQuiz();
  var topics = subj==='maths'?['ratio','fractions','percentage']:['photosynthesis','experiments','explaining'];
  var labels = subj==='maths'?['📐 Ratio','🔢 Fractions','💯 Percentage']:['🌿 Photosynthesis','🔬 Experiments','✏️ Explanations'];

  var h='<div class="pills">'+
    '<button class="pill '+(section==='museum'?'active':'')+'" onclick="section=\'museum\';render()">🏛️ Mistake Museum</button>'+
    '<button class="pill '+(section==='review'?'active':'')+'" onclick="section=\'review\';render()">📖 Concepts</button>'+
    '<button class="pill '+(section==='practice'?'active':'')+'" onclick="section=\'practice\';render()">🎯 Practice</button></div>';

  if(section==='museum'){
    h+='<div style="text-align:center;margin-bottom:12px"><b style="font-size:16px">🏛️ Mistake Museum</b><br><span style="font-size:13px;color:var(--gray-dark)">Learn from your actual mistakes — spot, understand, and fix!</span></div>';
    museum.filter(function(m){return m.subject===subj}).forEach(function(m){
      var done=S.museumDone.includes(m.id);
      h+='<div class="museum-card card-clickable" onclick="startMuseum(\''+m.id+'\')">'+
        '<div class="museum-hdr"><span class="m-icon">'+m.emoji+'</span>'+
        '<div><div class="m-title">'+m.title+'</div><div class="m-sub">'+m.desc+'</div></div>'+
        '<span class="m-badge '+(done?'m-badge-done':'m-badge-new')+'">'+(done?'✅ Done':'NEW')+'</span></div></div>';
    });
  } else if(section==='review'){
    topics.forEach(function(t){
      var c=concepts[subj][t];
      h+='<div class="card"><div class="concept-hdr" onclick="toggleC(\''+t+'\')"><span>'+c.title+'</span><span class="arrow" id="a-'+t+'">▼</span></div>'+
        '<div class="concept-body" id="b-'+t+'">'+c.pts.map(function(p){return '<div class="callout callout-'+(p.t==='y'?'yellow':p.t==='r'?'red':'green')+'">'+p.h+'</div>'}).join('')+'</div></div>';
    });
  } else {
    topics.forEach(function(t,i){
      var bank=subj==='maths'?QM[t]:QS[t];
      h+='<div class="banner" style="background:linear-gradient(135deg,'+['var(--blue),var(--purple)','var(--green),var(--blue)','var(--orange),var(--pink)'][i]+')" onclick="startQuiz(\''+subj+'\',\''+t+'\')">'+
        '<div class="icon">'+labels[i].split(' ')[0]+'</div>'+
        '<div><h3>'+labels[i].split(' ').slice(1).join(' ')+' Practice</h3><p>'+bank.length+' questions</p></div></div>';
    });
  }
  return h;
}

function toggleC(id){sndClick();document.getElementById('b-'+id).classList.toggle('show');document.getElementById('a-'+id).classList.toggle('open')}

// ============ MUSEUM FLOW ============
function startMuseum(id){
  sndClick();
  museumEntry=museum.find(function(m){return m.id===id});
  museumStep=0; sel=null; answered=false;
  render();
}

function renderMuseumFlow(){
  var m=museumEntry;
  var stepLabels=['🔍 Spot the Error','❌ Why Wrong is Wrong','✅ Why Right is Right','🎯 Your Turn'];
  var dots='<div class="steps">'+[0,1,2,3].map(function(i){return '<div class="step-dot '+(i===museumStep?'active':i<museumStep?'done':'')+'"></div>'}).join('')+'</div>';
  var label='<div class="step-label">'+stepLabels[museumStep]+'</div>';
  var back='<button class="btn btn-sm btn-blue" style="margin-bottom:12px" onclick="museumEntry=null;render()">← Back</button>';
  var h=back+dots+label;

  if(museumStep===0){
    h+='<div class="q-card"><div class="q-num">'+m.emoji+' '+m.title+'</div>'+
      '<div class="q-text">Can you spot what went wrong?</div>'+
      '<div class="q-context"><b>Question:</b> '+m.scenario.replace(/\n/g,'<br>')+'</div>'+
      '<div class="wrong-work">'+m.wrongWork+'</div>'+
      '<div style="margin-top:16px;font-weight:700;font-size:14px">What mistake did Eavan make?</div>'+
      '<div class="opts" style="margin-top:10px">'+renderOpts(m.spotQ.opts, m.spotQ.correct)+'</div>'+
      (!answered?'<button class="btn btn-green" style="margin-top:10px" onclick="checkMuseum()" '+(sel===null?'disabled':'')+'>CHECK</button>':'')+
      (answered?renderFb(sel===m.spotQ.correct,sel===m.spotQ.correct?'Great detective work!':'Look at the highlighted part again.','')+
        '<button class="btn btn-blue" style="margin-top:8px" onclick="museumNext()">CONTINUE →</button>':'')+
    '</div>';
  } else if(museumStep===1){
    h+='<div class="q-card"><div class="q-num">'+m.emoji+' '+m.title+'</div>'+
      '<div class="q-text">Understanding why the mistake happens</div>'+
      '<div class="refute-box refute-wrong"><h4>❌ Why Wrong is Wrong</h4><p>'+m.whyWrong.replace(/\n/g,'<br>')+'</p></div>'+
      '<div style="text-align:center;padding:12px;font-size:28px">⬇️</div>'+
      '<div class="refute-box refute-right"><h4>✅ The Correct Thinking</h4><p>'+m.whyRight.replace(/\n/g,'<br>')+'</p></div>'+
      '<div class="callout callout-blue" style="margin-top:12px"><b>🧠 Key Takeaway:</b> Now you know WHY this mistake happens and HOW to avoid it. Let\'s practice!</div>'+
      '<button class="btn btn-green" style="margin-top:12px" onclick="museumNext()">I UNDERSTAND → LET\'S PRACTICE</button>'+
    '</div>';
  } else if(museumStep===2){
    h+='<div class="q-card"><div class="q-num">🧠 Quick Check</div>'+
      '<div class="q-text">Before we practice — can you explain the correct method?</div>'+
      '<div class="callout callout-green" style="font-size:14px">'+m.whyRight.replace(/\n/g,'<br>')+'</div>'+
      '<div style="margin-top:16px;font-weight:700;font-size:14px">Do you feel confident about this concept?</div>'+
      '<div class="opts" style="margin-top:10px">'+
        '<button class="opt" onclick="sndOk();museumNext()" style="border-color:var(--green)"><span class="opt-l" style="background:var(--green);color:#fff;border-color:var(--green)">✓</span>Yes, I get it now!</button>'+
        '<button class="opt" onclick="museumStep=1;render()" style="border-color:var(--orange)"><span class="opt-l" style="background:var(--orange);color:#fff;border-color:var(--orange)">↺</span>Let me review again</button>'+
      '</div>'+
    '</div>';
  } else if(museumStep===3){
    var pq=m.practiceQ;
    h+='<div class="q-card"><div class="q-num">🎯 Apply What You Learned</div>'+
      '<div class="q-text">'+pq.q+'</div>'+
      '<div class="opts">'+renderOpts(pq.opts, pq.correct)+'</div>'+
      (!answered?'<button class="btn btn-green" style="margin-top:10px" onclick="checkMuseumPractice()" '+(sel===null?'disabled':'')+'>CHECK</button>':'')+
      (answered?renderFb(sel===pq.correct,sel===pq.correct?enc[~~(Math.random()*enc.length)]:encNo[~~(Math.random()*encNo.length)],pq.explain)+
        '<button class="btn btn-purple" style="margin-top:8px" onclick="finishMuseum()">COMPLETE ✓</button>':'')+
    '</div>';
  }
  return h;
}

function checkMuseum(){
  if(sel===null||answered)return;
  answered=true;
  var isOk=sel===museumEntry.spotQ.correct;
  if(isOk){sndOk();addXP(5)}else{sndNo()}
  render();
}
function checkMuseumPractice(){
  if(sel===null||answered)return;
  answered=true;
  var isOk=sel===museumEntry.practiceQ.correct;
  if(isOk){sndOk();addXP(10);S.qOk++}else{sndNo();loseH()}
  S.qAns++;save();render();
}
function museumNext(){sndClick();museumStep++;sel=null;answered=false;render()}
function finishMuseum(){
  sndUp();
  if(!S.museumDone.includes(museumEntry.id)){S.museumDone.push(museumEntry.id);addXP(15)}
  save();

  if(quiz && quiz.museumIds && quiz.museumIdx < quiz.museumIds.length - 1){
    quiz.museumIdx++;
    museumEntry = museum.find(function(m){return m.id===quiz.museumIds[quiz.museumIdx]});
    museumStep=0;sel=null;answered=false;
    render();
  } else {
    museumEntry=null;
    render();
  }
}

// ============ QUIZ ENGINE ============
function startQuiz(subj,topic){
  sndClick();
  var qs;
  if(topic==='mixed'||topic==='challenge'){
    var banks=subj==='maths'?QM:QS;
    var all=[];Object.values(banks).forEach(function(b){all=all.concat(b)});
    qs=shuffle(all).slice(0,8);
  } else {
    var bank=subj==='maths'?QM[topic]:QS[topic];
    qs=shuffle(bank.slice()).slice(0,8);
  }
  quiz={subj:subj,topic:topic,qs:qs};qIdx=0;qScore=0;sel=null;answered=false;render();
}

function startDay(day){
  sndClick();
  var plan=days[day-1];
  var mqs=[], sqs=[];
  if(plan.mathsQ.t==='mixed'||plan.mathsQ.t==='challenge'){
    var all=[];Object.values(QM).forEach(function(b){all=all.concat(b)});mqs=shuffle(all).slice(0,5);
  } else {
    plan.mathsQ.ids.forEach(function(i){if(QM[plan.mathsQ.t][i])mqs.push(QM[plan.mathsQ.t][i])});
  }
  if(plan.sciQ.t==='mixed'||plan.sciQ.t==='challenge'){
    var allS=[];Object.values(QS).forEach(function(b){allS=allS.concat(b)});sqs=shuffle(allS).slice(0,5);
  } else {
    plan.sciQ.ids.forEach(function(i){if(QS[plan.sciQ.t][i])sqs.push(QS[plan.sciQ.t][i])});
  }
  var mixed=[];
  var maxLen=Math.max(mqs.length,sqs.length);
  for(var i=0;i<maxLen;i++){
    if(i<mqs.length)mixed.push(mqs[i]);
    if(i<sqs.length)mixed.push(sqs[i]);
  }
  quiz={subj:'daily',topic:'Day '+day+': '+plan.title,qs:mixed,dayNum:day,museumIds:plan.museum,museumIdx:0};
  qIdx=0;qScore=0;sel=null;answered=false;
  if(plan.museum.length>0){
    museumEntry=museum.find(function(m){return m.id===plan.museum[0]});
    museumStep=0;
  }
  tab='home';
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  render();
}

function renderQuiz(){
  if(qIdx>=quiz.qs.length) return renderQuizDone();
  var q=quiz.qs[qIdx];
  if(!q._sh){
    var idx=q.opts.map(function(_,i){return i});
    for(var i=idx.length-1;i>0;i--){var j=~~(Math.random()*(i+1));var tmp=idx[i];idx[i]=idx[j];idx[j]=tmp}
    q._sh=idx;q._c=idx.indexOf(q.c);
  }
  var prog=(qIdx/quiz.qs.length)*100;
  var h='<button class="btn btn-sm btn-blue" style="margin-bottom:10px" onclick="quiz=null;render()">← Back</button>'+
    '<div class="prog-label">'+quiz.topic+' — Question '+(qIdx+1)+'/'+quiz.qs.length+'</div>'+
    '<div class="prog-bar" style="margin-bottom:14px"><div class="prog-fill" style="width:'+prog+'%;background:linear-gradient(90deg,var(--green),var(--blue))"></div></div>'+
    '<div class="q-card"><div class="q-num">Question '+(qIdx+1)+'</div>'+
    '<div class="q-text">'+q.q+'</div>'+
    '<div class="opts">'+renderOptsShuffled(q)+'</div>'+
    (!answered?'<button class="btn btn-green" style="margin-top:10px" onclick="checkQ()" '+(sel===null?'disabled':'')+'>CHECK</button>':'')+
    (answered?renderFb(sel===q._c,sel===q._c?enc[~~(Math.random()*enc.length)]:encNo[~~(Math.random()*encNo.length)],q.ex)+
      '<button class="btn btn-blue" style="margin-top:8px" onclick="nextQ()">CONTINUE →</button>':'')+
    '</div>';
  return h;
}

function renderQuizDone(){
  var pct=quiz.qs.length?Math.round(qScore/quiz.qs.length*100):0;
  var stars=pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':pct>=40?'⭐':'';
  return '<div class="q-card" style="text-align:center">'+
    '<div style="font-size:60px">'+(pct>=80?'🏆':pct>=60?'🎉':'💪')+'</div>'+
    '<h2 style="font-size:22px;font-weight:900;margin:8px 0">'+(pct>=80?'Excellent!':pct>=60?'Good Job!':'Keep Practising!')+'</h2>'+
    '<p style="font-size:18px">'+stars+'</p>'+
    '<p style="font-size:18px;font-weight:800;color:var(--green);margin:10px 0">'+qScore+'/'+quiz.qs.length+' correct ('+pct+'%)</p>'+
    '<button class="btn btn-green" onclick="quiz=null;'+(quiz.subj==='daily'?"go(\'home\')":"render()")+'">BACK TO MENU</button>'+
  '</div>';
}

function checkQ(){
  if(sel===null||answered)return;answered=true;
  var q=quiz.qs[qIdx],ok=sel===q._c;
  if(ok){sndOk();qScore++;addXP(10);S.qOk++}else{sndNo();loseH()}
  S.qAns++;save();render();
}
function nextQ(){
  sndClick();qIdx++;sel=null;answered=false;
  if(qIdx>=quiz.qs.length&&quiz.dayNum){
    if(!S.done.includes(quiz.dayNum)){S.done.push(quiz.dayNum);S.streak++}
    save();showCeleb();
  }
  render();
}

// ============ RENDER HELPERS ============
function renderOpts(opts,correctIdx){
  var L='ABCD';
  return opts.map(function(o,i){
    var cls='';
    if(answered){if(i===correctIdx)cls='ok';else if(i===sel)cls='no'}
    else if(i===sel)cls='sel';
    return '<button class="opt '+cls+'" onclick="pickOpt('+i+')" '+(answered?'disabled':'')+'><span class="opt-l">'+L[i]+'</span><span>'+o+'</span></button>';
  }).join('');
}

function renderOptsShuffled(q){
  var L='ABCD';
  return q._sh.map(function(origIdx,dispIdx){
    var cls='';
    if(answered){if(dispIdx===q._c)cls='ok';else if(dispIdx===sel&&dispIdx!==q._c)cls='no'}
    else if(dispIdx===sel)cls='sel';
    return '<button class="opt '+cls+'" onclick="pickOpt('+dispIdx+')" '+(answered?'disabled':'')+'><span class="opt-l">'+L[dispIdx]+'</span><span>'+q.opts[origIdx]+'</span></button>';
  }).join('');
}

function renderFb(ok,msg,explain){
  return '<div class="fb show '+(ok?'fb-ok':'fb-no')+'"><span class="fb-icon">'+(ok?'✅':'❌')+'</span>'+
    '<div class="fb-text"><div>'+msg+'</div>'+(explain?'<div class="fb-explain">'+explain+'</div>':'')+'</div></div>';
}

function pickOpt(i){if(!answered){sndClick();sel=i;render()}}

function showCeleb(){
  var pct=quiz.qs.length?Math.round(qScore/quiz.qs.length*100):0;
  if(pct>=50){confetti();sndUp();addXP(20);
    document.getElementById('cT').textContent=pct>=80?'🏆':'🎉';
    document.getElementById('cH').textContent=pct>=80?'Outstanding!':'Well Done!';
    document.getElementById('cM').textContent=qScore+'/'+quiz.qs.length+' correct!';
    document.getElementById('cX').textContent='+'+(qScore*10+20)+' XP';
    document.getElementById('celeb').classList.add('show');
  }
}
function closeCeleb(){document.getElementById('celeb').classList.remove('show')}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=~~(Math.random()*(i+1));var tmp=b[i];b[i]=b[j];b[j]=tmp}return b}

// ============ INIT ============
render();
</script>
</body>
</html>
